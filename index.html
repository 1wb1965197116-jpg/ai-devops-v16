<!DOCTYPE html>
<html>
<head>
  <title>AI DevOps Platform v14</title>
</head>

<body style="background:#111;color:#fff;font-family:Arial;padding:20px;">

<h2>AI DevOps Platform v14</h2>

<input id="project" placeholder="Project name (bb-ai-core)"
style="width:100%;padding:8px;margin-bottom:10px;">

<!-- MAIN ACTIONS -->
<div style="margin-bottom:10px;">
  <button onclick="showTab('mongo')">Mongo</button>
  <button onclick="showTab('render')">Render</button>
  <button onclick="showTab('api')">API Keys</button>
</div>

<div style="margin-bottom:15px;">
  <button onclick="analyze()">Analyze</button>
  <button onclick="fix()">Fix</button>
  <button onclick="build()">Build Project</button>
  <button onclick="pushGit()">Push to GitHub</button>
</div>

<!-- MONGO TAB -->
<div id="mongo" class="tab">
  <h3>Mongo Config</h3>
  <textarea id="mongoInput"
    placeholder="mongodb+srv://user:<password>@cluster.mongodb.net"
    style="width:100%;height:100px;"></textarea>
</div>

<!-- RENDER TAB -->
<div id="render" class="tab" style="display:none;">
  <h3>Render Config</h3>
  <pre id="renderOutput"></pre>
</div>

<!-- API TAB -->
<div id="api" class="tab" style="display:none;">
  <h3>API Keys (.env extras)</h3>
  <textarea id="apiInput"
    placeholder="STRIPE_KEY=...\nOPENAI_KEY=..."
    style="width:100%;height:100px;"></textarea>
</div>

<!-- STATUS -->
<h3>Status</h3>
<div id="status" style="margin-bottom:10px;color:#0f0;"></div>

<!-- OUTPUT -->
<h3>Generated ENV</h3>
<pre id="output" style="background:#000;padding:10px;"></pre>

<script src="renderer.js"></script>

</body>
</html>
