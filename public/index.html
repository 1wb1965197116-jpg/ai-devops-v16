<!DOCTYPE html>
<html>
<head>
  <title>AI DevOps Vision OS v26</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body style="background:#0b0b0b;color:#fff;font-family:Arial;">

<h2>AI DevOps Vision OS v26</h2>

<div style="display:flex;">

<!-- LEFT -->
<div style="width:40%;padding:10px;border-right:1px solid #333;">

  <textarea id="cmd"
    placeholder="Type command OR run COPY ROUTE"
    style="width:100%;height:100px;"></textarea><br><br>

  <button onclick="execute()">▶ Execute</button>

  <hr>

  <h3>📋 Copy Route System</h3>

  <select id="from">
    <option>OpenAI Output</option>
    <option>Mongo URI</option>
    <option>Supabase Key</option>
    <option>GitHub Token</option>
  </select>

  <br><br>

  <select id="to">
    <option>GitHub</option>
    <option>Render ENV</option>
    <option>Supabase</option>
    <option>MongoDB Atlas</option>
  </select>

  <br><br>

  <button onclick="copyRoute()">📍 Execute Copy Route</button>

</div>

<!-- RIGHT -->
<div style="width:60%;padding:10px;">

  <h3>🧠 System Output</h3>
  <pre id="out" style="background:#000;height:400px;overflow:auto;padding:10px;"></pre>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
