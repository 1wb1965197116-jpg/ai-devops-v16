<!DOCTYPE html>
<html>
<head>
  <title>AI DevOps Vision OS v25</title>

  <!-- OCR LIBRARY -->
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body style="background:#0b0b0b;color:#fff;font-family:Arial;">

<h2>AI DevOps Vision OS v25</h2>

<div style="display:flex;">

<!-- LEFT PANEL -->
<div style="width:40%;padding:10px;border-right:1px solid #333;">

  <input id="repo" placeholder="GitHub repo URL" style="width:100%;padding:8px;"><br><br>

  <textarea id="input"
    placeholder="Paste config OR OCR result will appear here..."
    style="width:100%;height:120px;"></textarea><br><br>

  <button onclick="analyze()">🧠 Analyze</button>
  <button onclick="scanRepo()">🔍 Scan GitHub</button>

  <hr>

  <h3>📷 Vision Input</h3>

  <video id="video" autoplay style="width:100%;border:1px solid #333;"></video><br><br>

  <button onclick="startCamera()">Start Camera</button>
  <button onclick="flipCamera()">🔄 Flip</button>
  <button onclick="captureOCR()">📸 OCR Scan</button>

</div>

<!-- RIGHT PANEL -->
<div style="width:60%;padding:10px;">

  <h3>🧠 AI Output</h3>
  <pre id="output" style="background:#000;height:200px;overflow:auto;padding:10px;"></pre>

  <h3>📦 Repo Analysis</h3>
  <pre id="repoOut" style="background:#000;height:200px;overflow:auto;padding:10px;"></pre>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
