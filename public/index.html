<!DOCTYPE html>
<html>
<head>
  <title>AI DevOps Automation Engine v27</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body style="margin:0;background:#0b0b0b;color:#fff;font-family:Arial;">

<h2 style="padding:10px;">AI DevOps Automation Engine v27</h2>

<div style="display:flex;height:92vh;">

<!-- LEFT PANEL -->
<div style="width:40%;padding:10px;border-right:1px solid #333;">

  <textarea id="cmd"
    placeholder="Type command (analyze, scan, copy route, generate)"
    style="width:100%;height:80px;"></textarea><br><br>

  <button onclick="execute()">▶ Execute</button>

  <hr>

  <h3>📋 Copy Route</h3>

  <select id="from">
    <option>OpenAI Output</option>
    <option>Mongo URI</option>
    <option>Supabase Key</option>
    <option>GitHub Token</option>
  </select>

  <br><br>

  <select id="to">
    <option>GitHub</option>
    <option>Render ENV</option>
    <option>Supabase</option>
    <option>MongoDB Atlas</option>
  </select>

  <br><br>

  <button onclick="copyRoute()">📍 Copy Route Execute</button>

  <hr>

  <h3>📷 Camera System</h3>

  <video id="video" autoplay style="width:100%;border:1px solid #333;"></video><br><br>

  <button onclick="startCamera()">Start Camera</button>
  <button onclick="flipCamera()">🔄 Flip Camera</button>
  <button onclick="captureOCR()">📸 OCR Scan</button>

</div>

<!-- RIGHT PANEL -->
<div style="width:60%;padding:10px;">

  <h3>🧠 Output Log</h3>
  <pre id="out" style="background:#000;height:90%;overflow:auto;padding:10px;"></pre>

</div>

</div>

<script src="app.js"></script>
</body>
</html>
