<!DOCTYPE html>
<html>
<head>
  <title>AI DevOps Network v30+</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body style="background:#0b0b0b;color:#fff;font-family:Arial;">

<h2>AI DevOps Autonomous Network</h2>

<textarea id="cmd" style="width:100%;height:90px;"
placeholder="Commands: extract mongo / paste github / deploy / scan"></textarea>

<br><br>

<button onclick="execute()">▶ Execute</button>

<hr>

<h3>📋 Copy Route (REAL)</h3>

<select id="from">
  <option>Mongo URI</option>
  <option>Supabase Key</option>
  <option>OpenAI Output</option>
  <option>GitHub Token</option>
</select>

<select id="to">
  <option>GitHub</option>
  <option>Render ENV</option>
  <option>Supabase</option>
  <option>MongoDB Atlas</option>
</select>

<br><br>

<button onclick="copyRoute()">📍 Run Copy Route</button>

<hr>

<h3>📷 Camera OCR</h3>

<video id="video" autoplay style="width:300px;"></video><br>

<button onclick="startCamera()">Start</button>
<button onclick="flipCamera()">Flip</button>
<button onclick="scanOCR()">OCR Scan</button>

<hr>

<h3>🧠 Log</h3>
<pre id="out"></pre>

<script src="app.js"></script>
</body>
</html>
