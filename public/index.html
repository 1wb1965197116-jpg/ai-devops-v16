<!DOCTYPE html>
<html>
<head>
  <title>AI DevOps Agent v22</title>
</head>

<body style="background:#0b0b0b;color:#fff;font-family:Arial;">

<h2 style="padding:10px;">AI DevOps Agent v22</h2>

<div style="display:flex;">

<!-- LEFT -->
<div style="width:40%;padding:10px;">

  <textarea id="input"
    placeholder="Paste config OR scan OR speak..."
    style="width:100%;height:120px;"></textarea><br><br>

  <button onclick="analyze()">Analyze</button>
  <button onclick="autoFix()">Auto-Fix</button>

  <hr>

  <h3>📷 Camera Scan</h3>

  <video id="video" width="100%" autoplay></video><br>
  <button onclick="startCamera()">Start Camera</button>
  <button onclick="capture()">Capture → Analyze</button>

</div>

<!-- RIGHT -->
<div style="width:60%;padding:10px;">

  <h3>🧠 AI Output</h3>
  <pre id="output" style="background:#000;height:200px;overflow:auto;"></pre>

  <h3>📦 Generated Fix</h3>
  <pre id="gen" style="background:#000;height:200px;overflow:auto;"></pre>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
